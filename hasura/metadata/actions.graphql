}

type ActionDexSettings {
  unified_ref_amount: Float!
  whitelisted_denoms: [String]
}

type ActionPSEScore {
  address: String!
  height: Int!
  score: String
}

type ActionPSEScheduledDistributions {
  scheduled_distributions: [ActionPSEScheduledDistribution]
}

type ActionPSEScheduledDistribution {
  timestamp: String!
  allocations: [ActionPSEAllocation]
}

type ActionPSEAllocation {
  clearing_account: String!
  amount: String!
}

type ActionPSEClearingAccountBalances {
  balances: [ActionPSEBalance]
}

type ActionPSEBalance {
  clearing_account: String!
  balance: String!
}

type ActionPSEParams {
  params: ActionPSEParamsData!
}

type ActionPSEParamsData {
  excluded_addresses: [String]
  clearing_account_mappings: [ActionPSEClearingAccountMapping]
}

type ActionPSEClearingAccountMapping {
  clearing_account: String!
