table:
  name: bridge_evidence
  schema: public
object_relationships:
  - name: block
    using:
      foreign_key_constraint_on: height
  - name: bridge_transaction
    using:
      manual_configuration:
        column_mapping:
          tx_unique_key: unique_key
        insertion_order: null
        remote_table:
          name: bridge_transaction
          schema: public
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - tx_unique_key
        - height
        - hash
        - msg_index
        - relayer_address
        - threshold_reached
        - settlement_hash
        - result
      filter: {}
