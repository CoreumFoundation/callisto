table:
  name: bridge_evidence
  schema: public
object_relationships:
  - name: block
    using:
      foreign_key_constraint_on: height
  - name: bridge_transaction
    using:
      foreign_key_constraint_on: transaction_id
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - transaction_id
        - height
        - hash
        - msg_index
        - relayer_address
        - threshold_reached
        - settlement_hash
        - result
      filter: {}
