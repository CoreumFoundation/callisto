table:
  name: bridge_transaction
  schema: public
array_relationships:
  - name: bridge_evidences
    using:
      manual_configuration:
        column_mapping:
          unique_key: tx_unique_key
        insertion_order: null
        remote_table:
          name: bridge_evidence
          schema: public
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - operation_unique_id
        - height
        - user_initiated_hash
        - msg_index
        - source_chain
        - destination_chain
        - sender
        - recipient
        - denom
        - amount
      filter: {}
