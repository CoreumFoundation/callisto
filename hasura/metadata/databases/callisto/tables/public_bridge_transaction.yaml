table:
  name: bridge_transaction
  schema: public
array_relationships:
  - name: bridge_evidences
    using:
      foreign_key_constraint_on:
        column: transaction_id
        table:
          name: bridge_evidence
          schema: public
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - operation_unique_id
        - height
        - user_initiated_hash
        - msg_index
        - source_chain
        - destination_chain
        - sender
        - recipient
        - denom
        - amount
      filter: {}
